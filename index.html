<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="PixelWordHunter - TOEIC Edition: Learn 600 business English words with adaptive spaced repetition. Master TOEIC vocabulary through a retro pixel-art quiz game.">
  <title>PixelWordHunter</title>
  
  <!-- PWA Manifest -->
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="./assets/favicon.ico">

  <!-- Stylesheet -->
  <link rel="stylesheet" href="./style.css">

  <!-- iOS PWA Support -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PixelWordHunter">
  <link rel="apple-touch-icon" href="./assets/logo.png">
  
  <!-- Theme Color -->
  <meta name="theme-color" content="#0a0010">
  
  <!-- Preload Fonts -->
  <link rel="preload" href="/assets/press-start-2p-v16-cyrillic_latin-regular.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="/assets/Mulmaru.woff2" as="font" type="font/woff2" crossorigin>
</head>
<body data-theme="cyberpunk">
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <div class="crt-overlay"></div>
  
  <!-- iOS Notification -->
  <div id="ios-notification" class="ios-notification hidden" role="status" aria-live="polite">
    <span class="notification-icon">👤</span>
    <span class="notification-text" id="notification-text"></span>
  </div>

  <main id="main-content" role="main" tabindex="-1">
    <!-- ── LOAD ERROR ──────────────────────────── -->
    <div id="load-error" hidden role="alert"></div>

    <!-- ── MENU SCREEN ────────────────────────── -->
    <div id="menu-screen" class="game-container hidden">
      <h1 class="game-title">
        <span data-i18n="pixel_word_hunter">PIXEL<br>WORD<br>HUNTER</span>
      </h1>
      <div class="edition-badge" data-i18n="toEIC_edition">// TOEIC EDITION //</div>
      <div class="stats-line" aria-live="polite" aria-atomic="true">
        <span data-i18n="mastered">MASTERED</span>&nbsp;<span id="mastered-count">0</span>&nbsp;/&nbsp;<span id="total-count">600</span> | <span id="menu-xp">0 XP</span>
      </div>
      <!-- Индикатор синхронизации с облаком -->
      <div id="sync-status" class="sync-indicator" aria-live="polite" aria-atomic="true">
        <span id="sync-text"></span>
        <button id="retry-sync-btn" class="hidden retry-sync-btn" aria-label="Retry synchronization">🔄 Retry</button>
      </div>
      <p class="blink" aria-hidden="true" data-i18n="press_hunt">▸ PRESS HUNT ◂</p>
      
      <!-- Auth Buttons (до логина) -->
      <div class="auth-buttons" id="auth-buttons">
        <button class="auth-btn" id="login-modal-btn" data-i18n="login">▶&#xFE0E; LOGIN</button>
        <button class="auth-btn register-btn" id="register-modal-btn" data-i18n="register">▶&#xFE0E; REGISTER</button>
      </div>
      <!-- Hunt Button (после логина) -->
      <button class="start-btn hunt-btn hidden" id="hunt-btn" role="button" data-i18n-prefix="hunt_prefix">▶&#xFE0E;&nbsp;<span data-i18n="hunt">HUNT</span></button>
      <button class="settings-btn" id="settings-btn" role="button" data-i18n="settings">SETTINGS</button>
      <div class="credits" data-i18n="credits">© 2026 ALMAZ CORP</div>
    </div>

    <!-- ── SETTINGS SCREEN ─────────────────────── -->
    <div id="settings-screen" class="game-container hidden" role="region" aria-label="Settings">
      <button class="back-btn" id="settings-back-btn" role="button" data-i18n="back">◀ BACK</button>
      <h2 class="screen-title" data-i18n="settings_title">// SETTINGS //</h2>
      
      <div class="settings-content">
        <!-- Language selector -->
        <div class="settings-row">
          <span class="settings-label" data-i18n="language">LANGUAGE</span>
          <div class="theme-btns lang-btns" role="group" aria-label="Language selection">
            <button class="theme-btn lang-btn" role="button" data-lang="en" title="English" aria-label="English">EN</button>
            <button class="theme-btn lang-btn" role="button" data-lang="ru" title="Русский" aria-label="Russian">RU</button>
            <button class="theme-btn lang-btn" role="button" data-lang="ko" title="한국어" aria-label="Korean">KO</button>
          </div>
        </div>
        
        <!-- Theme selector -->
        <div class="settings-row">
          <span class="settings-label" id="theme-label" data-i18n="theme">THEME</span>
          <div class="theme-btns" role="group" aria-labelledby="theme-label">
            <button class="theme-btn active" role="button" data-theme="cyberpunk" title="Cyberpunk" aria-label="Cyberpunk theme">
              <span class="theme-dot cyberpunk" aria-hidden="true"></span><span data-i18n="theme_cyberpunk">CYB</span>
            </button>
            <button class="theme-btn" role="button" data-theme="midnight" title="Midnight" aria-label="Midnight theme">
              <span class="theme-dot midnight" aria-hidden="true"></span><span data-i18n="theme_midnight">MID</span>
            </button>
            <button class="theme-btn" role="button" data-theme="matrix" title="Matrix" aria-label="Matrix theme">
              <span class="theme-dot matrix" aria-hidden="true"></span><span data-i18n="theme_matrix">MTX</span>
            </button>
            <button class="theme-btn" role="button" data-theme="3310" title="3310" aria-label="3310 Nokia theme">
              <span class="theme-dot t3310" aria-hidden="true"></span>3310
            </button>
            <button class="theme-btn" role="button" data-theme="sunset" title="Sunset" aria-label="Sunset theme">
              <span class="theme-dot sunset" aria-hidden="true"></span><span data-i18n="theme_sunset">SUN</span>
            </button>
            <button class="theme-btn" role="button" data-theme="mono" title="Mono" aria-label="Mono theme">
              <span class="theme-dot mono" aria-hidden="true"></span><span data-i18n="theme_mono">MON</span>
            </button>
          </div>
        </div>
        
        <!-- Sound toggle -->
        <div class="settings-row">
          <span class="settings-label" data-i18n="sound">SOUND</span>
          <button id="settings-sound-btn" class="sound-toggle-btn" role="button" aria-pressed="false">
            <span id="settings-sound-icon" aria-label="Sound on">🔊</span>
            <span id="settings-sound-label" data-i18n="on">ON</span>
          </button>
        </div>
        
        <!-- Backup/Restore -->
        <div class="settings-row">
          <span class="settings-label">BACKUP</span>
          <div class="backup-actions">
            <button class="theme-btn" id="export-btn" aria-label="Export progress">📤 EXPORT</button>
            <label class="theme-btn backup-import-label" aria-label="Import progress">
              📥 IMPORT
              <input type="file" id="import-input" accept=".json" hidden>
            </label>
          </div>
        </div>
        
        <!-- Reset progress -->
        <div class="settings-reset">
          <button class="reset-btn" id="reset-progress-btn" role="button" data-i18n="reset_progress">RESET PROGRESS</button>
        </div>
        
        <!-- Logout button -->
        <div class="settings-reset">
          <button class="reset-btn logout-btn" id="logout-btn" role="button">LOGOUT</button>
        </div>
      </div>
    </div>

    <!-- ── CATEGORY SCREEN ────────────────────── -->
    <div id="category-screen" class="game-container hidden" role="region" aria-label="Category selection">
      <button class="back-btn" id="category-back-btn" role="button" data-i18n="back">◀ BACK</button>
      <h2 class="screen-title" data-i18n="select_category">// SELECT CATEGORY //</h2>
      <div id="category-list" class="category-grid" role="list"></div>
    </div>

    <!-- ── GAME SCREEN ────────────────────────── -->
    <div id="game-screen" class="game-container hidden" role="region" aria-label="Game">
      <header>
        <div class="stat"><span data-i18n="category_label">CAT:</span>&nbsp;<span id="category" data-i18n="all">ALL</span></div>
        <div class="header-actions">
          <div class="stat header-xp"><span data-i18n="xp_label">XP:</span>&nbsp;<span id="game-xp" aria-live="polite">0</span></div>
          <button class="icon-btn exit-icon-btn" id="exit-game-btn" role="button" data-i18n-title="exit" title="Exit to menu" aria-label="Exit to menu">✕</button>
        </div>
      </header>
      <div id="quiz-box">
        <div class="question-card">
          <h1 id="word" aria-live="polite"></h1>
        </div>
        <div class="options-grid" id="options" role="group" aria-label="Answer options"></div>
      </div>
      <div id="explanation-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="explanation-title" aria-describedby="explanation-list">
        <h2 class="modal-title" id="explanation-title" data-i18n="word_review">// WORD REVIEW //</h2>
        <div id="explanation-list"></div>
        <button class="next-btn" id="next-question-btn" role="button"><span data-i18n="next">NEXT</span>&nbsp;&#x25B6;&#xFE0E;</button>
      </div>
      <div id="feedback" class="hidden" aria-live="polite"></div>
    </div>

    <!-- ── AUTH MODAL ─────────────────────────── -->
    <div id="auth-modal" class="modal auth-modal hidden" role="dialog" aria-modal="true" aria-labelledby="auth-title" aria-describedby="auth-error">
      <div class="auth-container">
        <h2 class="modal-title" id="auth-title" data-i18n="login_title">// LOGIN //</h2>
        
        <form id="auth-form" class="auth-form" onsubmit="return false;">
          <div class="auth-field username-field-hidden" id="username-field" aria-hidden="true">
            <label for="auth-username" data-i18n="username">USERNAME</label>
            <input type="text" id="auth-username" data-i18n-placeholder="enter_username" placeholder="Enter username" autocomplete="username" tabindex="-1">
          </div>
          
          <div class="auth-field">
            <label for="auth-email" data-i18n="email">EMAIL</label>
            <input type="email" id="auth-email" data-i18n-placeholder="enter_email" placeholder="Enter email" autocomplete="email" required>
          </div>
          
          <div class="auth-field">
            <label for="auth-password" data-i18n="password">PASSWORD</label>
            <input type="password" id="auth-password" data-i18n-placeholder="enter_password" placeholder="Enter password" autocomplete="current-password" required>
          </div>
          
          <div id="auth-error" class="auth-error" role="alert" aria-live="assertive" aria-atomic="true"></div>
          
          <button type="button" class="auth-submit" id="auth-submit" data-i18n="submit">ENTER</button>
        </form>
        
        <div class="auth-toggle">
          <span id="auth-toggle-text" data-i18n="need_account">Need an account?</span>
          <button type="button" class="auth-toggle-btn" id="auth-toggle-btn" data-i18n="toggle_register">REGISTER</button>
        </div>
        
        <button class="auth-close" id="auth-close-btn" aria-label="Close">✕</button>
      </div>
    </div>
  </main>
  
  <script type="module" src="/app.js"></script>
</body>
</html>
